name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      F1DI_ENV: test
      F1DI_LLM_BACKEND: rules
      F1DI_VECTOR_BACKEND: memory
      F1DI_DETERMINISTIC: "true"
      F1DI_STORAGE_URL: sqlite:///./ci_test.db

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen --extra regression --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest

      - name: Generate synthetic scenarios
        run: uv run python scripts/generate_synthetic_race.py

      - name: Regression gate
        run: uv run python scripts/run_replay_regression.py

      - name: Real replay evaluation gate
        run: uv run python scripts/run_real_replay_gate.py

      - name: Calibrator quality gate
        run: |
          uv run python scripts/fit_calibrator.py
          uv run python - <<'EOF'
          import json, sys
          from pathlib import Path
          q = json.loads(Path("data/calibration/quality.json").read_text())
          ece = q.get("ece", 1.0)
          brier = q.get("brier_score", 1.0)
          print(f"Calibrator ECE={ece:.4f}  Brier={brier:.4f}")
          if ece > 0.15:
              print(f"FAIL: ECE {ece:.4f} exceeds threshold 0.15")
              sys.exit(1)
          if brier > 0.15:
              print(f"FAIL: Brier {brier:.4f} exceeds threshold 0.15")
              sys.exit(1)
          print("PASS")
          EOF

      - name: Verify Alembic migrations
        run: |
          F1DI_STORAGE_URL=sqlite:///./alembic_test.db uv run alembic upgrade head
          F1DI_STORAGE_URL=sqlite:///./alembic_test.db uv run alembic downgrade base
          F1DI_STORAGE_URL=sqlite:///./alembic_test.db uv run alembic upgrade head
          rm -f alembic_test.db

      - name: Regression tests
        run: |
          uv run pytest tests/regression/test_ingesters.py \
                        tests/regression/test_outcome_labeler.py \
                        tests/regression/test_kafka_worker.py \
                        tests/regression/test_ml_endpoints.py \
                        tests/regression/test_api_smoke.py \
                        tests/regression/test_replay_fixture_schema.py \
                        tests/regression/test_retrieval_quality.py \
                        tests/regression/test_recommendation_quality.py \
                        tests/regression/test_real_replay_gate.py \
                        tests/regression/test_orchestrator.py \
                        -v

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Build image
        run: docker build .
