name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync code to server
        run: |
          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.env' \
            --exclude 'data/' \
            --exclude '*.db' \
            --exclude '*.db-shm' \
            --exclude '*.db-wal' \
            --exclude '__pycache__/' \
            --exclude 'frontend/node_modules/' \
            --exclude 'frontend/dist/' \
            --exclude '.uv-cache/' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            . ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/f1di/

      - name: Build and restart API
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /opt/f1di && \
             docker compose -f docker-compose.prod.yml build api && \
             docker compose -f docker-compose.prod.yml up -d api"

      - name: Wait for health check
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "for i in \$(seq 1 24); do
               STATUS=\$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/health)
               if [ \"\$STATUS\" = '200' ]; then
                 echo 'API is healthy'; exit 0
               fi
               echo \"Attempt \$i: status \$STATUS, waiting 5s...\"; sleep 5
             done
             echo 'API did not become healthy in time'; exit 1"

      - name: Smoke test
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "curl -sf http://localhost:8080/version | python3 -c \
             'import sys, json; v = json.load(sys.stdin); print(\"Deployed:\", v[\"version\"], \"|\", v[\"model_backend\"], \"|\", v[\"vector_backend\"])'"
